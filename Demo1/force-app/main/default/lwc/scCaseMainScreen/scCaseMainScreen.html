<template>

            <lightning-button label="New Case" icon-name="utility:new"
                icon-position="right" variant="brand" onclick={handleClick} name="newcase">
            </lightning-button>
        </lightning-layout-item>

            <c-sc-display-cases onsccaseevent={handleEvent} cases={cases}></c-sc-display-cases>
        </lightning-layout-item>  -->
    </lightning-layout>

</template>
